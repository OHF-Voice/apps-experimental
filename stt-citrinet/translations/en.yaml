---
configuration:
  model:
    name: Model name
    description: >-
      NeMo model to use. This app is only compatible with CTC models.
  max_score:
    name: Maximum score
    description: >-
      Maximum relative sentence probability before recognition stops.
      Enable debug logging to see probabilities.
  use_max_score:
    name: Use maximum score
    description: >-
      Enable use of maximum score to stop recognition for out-of-vocabulary
      sentences.
  debug_logging:
    name: Debug logging
    description: >-
      Enable debug logging.
network:
  10300/tcp: stt-citrinet Wyoming Protocol
